version: 2
updates:
  - package-ecosystem: "github-actions"
    # Check GitHub actions weekly for updates
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # Python dependencies are fully pinned pip-compile lock files with hashes.
  # Dependabot cannot regenerate them correctly (it patches individual pins without
  # re-solving the graph). Vulnerability detection is handled by pip-audit in CI.
  # See notes/python-dependency-updates.md for the update procedure.

  - package-ecosystem: "npm"
    # New Angular frontend — dependabot can update package.json ranges correctly
    directory: "/privacyidea/static_new"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
